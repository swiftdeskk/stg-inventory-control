services:
  db:
    image: postgres:15-alpine
    container_name: techstore-db
    environment:
      POSTGRES_USER: admin_techstore
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: techstore_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: