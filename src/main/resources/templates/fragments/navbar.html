<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav class="navbar top-navbar px-3" th:fragment="navbar">
  <div class="container-fluid d-flex align-items-center gap-2">

    <!-- Toggle sidebar -->
    <button type="button" id="sidebarCollapse" class="btn-sidebar-toggle" title="Ocultar/Mostrar Menú">
      <i class="fa-solid fa-bars" style="font-size:0.85rem;"></i>
    </button>

    <div class="ms-auto d-flex align-items-center gap-2">

      <!-- Dark / Light mode toggle -->
      <button type="button" id="btn-theme-toggle" class="btn-theme-toggle" title="Cambiar tema">
        <i id="theme-icon" class="fa-solid fa-moon"></i>
      </button>

      <!-- Stock bajo badge -->
      <div class="position-relative">
        <a th:href="@{/}" class="btn-theme-toggle position-relative" title="Alertas de stock bajo"
           style="text-decoration:none;">
          <i class="fa-solid fa-bell" style="font-size:0.9rem;"></i>
          <span id="stock-badge"
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                style="font-size:0.55rem; padding:3px 5px; display:none;">0</span>
        </a>
      </div>

      <!-- User dropdown -->
      <div class="dropdown">
        <button class="btn d-flex align-items-center gap-2 py-1 px-2"
                style="background:transparent; border: 1px solid var(--border-color); border-radius:10px;"
                type="button" data-bs-toggle="dropdown" aria-expanded="false">
          <img th:src="@{'https://ui-avatars.com/api/?name=' + ${usuarioActual} + '&background=0d6efd&color=fff&size=64'}"
               th:alt="${usuarioActual}"
               class="navbar-user-avatar" width="28" height="28"/>
          <span class="navbar-user-name d-none d-sm-inline" th:text="${usuarioActual}">Usuario</span>
          <i class="fa-solid fa-chevron-down" style="font-size:0.6rem; opacity:0.5;"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end mt-2">
          <li>
            <a class="dropdown-item" th:href="@{/perfil}">
              <i class="fa-solid fa-user-gear me-2" style="opacity:0.6;"></i> Mi Perfil
            </a>
          </li>
          <li><hr class="dropdown-divider"/></li>
          <li>
            <form th:action="@{/logout}" method="post" class="m-0 p-0">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="dropdown-item text-danger w-100 text-start">
                <i class="fa-solid fa-power-off me-2"></i> Cerrar Sesión
              </button>
            </form>
          </li>
        </ul>
      </div>

    </div>
  </div>
</nav>

<!-- Mobile overlay -->
<div id="sidebar-overlay"></div>

<script>
  (function pollStockBajo() {
    fetch('/api/stock-bajo/count')
      .then(r => r.json())
      .then(data => {
        const badge = document.getElementById('stock-badge');
        if (badge) {
          if (data.count > 0) {
            badge.textContent = data.count > 99 ? '99+' : data.count;
            badge.style.display = 'inline';
          } else {
            badge.style.display = 'none';
          }
        }
      })
      .catch(() => {});
    setTimeout(pollStockBajo, 30000);
  })();
</script>

</body>
</html>
