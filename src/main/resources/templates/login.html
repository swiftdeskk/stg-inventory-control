<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechStore — Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" th:href="@{/css/login.css}"/>
</head>
<body>

<!-- Dark mode toggle (esquina) -->
<button id="btn-theme-toggle" class="login-theme-btn" title="Cambiar tema">
  <i id="theme-icon" class="fa-solid fa-moon"></i>
</button>

<div class="login-wrapper">
  <div class="login-card">
    <div class="text-center">
      <div class="login-logo-box">
        <i class="fa-solid fa-boxes-stacked"></i>
      </div>
      <h4 class="login-title">TechStore</h4>
      <p class="login-subtitle">Sistema de Control de Inventarios</p>
    </div>

    <!-- RF-02 -->
    <div th:if="${param.error}" class="alert alert-danger text-center small py-2 mb-3">
      <span th:if="${session['SPRING_SECURITY_LAST_EXCEPTION'] != null
                     and session['SPRING_SECURITY_LAST_EXCEPTION'].getClass().getSimpleName() == 'LockedException'}">
        <i class="fa-solid fa-lock me-1"></i> Cuenta bloqueada por múltiples intentos fallidos.
      </span>
      <span th:unless="${session['SPRING_SECURITY_LAST_EXCEPTION'] != null
                         and session['SPRING_SECURITY_LAST_EXCEPTION'].getClass().getSimpleName() == 'LockedException'}">
        <i class="fa-solid fa-circle-exclamation me-1"></i> Usuario o contraseña incorrectos.
      </span>
    </div>

    <div th:if="${param.logout}" class="alert alert-success text-center small py-2 mb-3">
      <i class="fa-solid fa-circle-check me-1"></i> Sesión cerrada correctamente.
    </div>

    <form th:action="@{/login}" method="post">
      <div class="mb-3">
        <label for="username" class="login-form-label">Usuario</label>
        <div class="input-group login-input-group">
          <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
          <input type="text" id="username" name="username" class="form-control"
                 placeholder="Tu nombre de usuario" required autofocus/>
        </div>
      </div>
      <div class="mb-4">
        <label for="password" class="login-form-label">Contraseña</label>
        <div class="input-group login-input-group">
          <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="••••••••" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-login w-100">
        Ingresar al Sistema <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>
      </button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script>
  const THEME_KEY = "techstore-theme";
  function applyTheme(t) {
    document.documentElement.setAttribute("data-theme", t);
    const icon = document.getElementById("theme-icon");
    if (icon) icon.className = t === "dark" ? "fa-solid fa-sun" : "fa-solid fa-moon";
  }
  applyTheme(localStorage.getItem(THEME_KEY) || "light");
  document.getElementById("btn-theme-toggle").addEventListener("click", () => {
    const next = (document.documentElement.getAttribute("data-theme") || "light") === "dark" ? "light" : "dark";
    localStorage.setItem(THEME_KEY, next);
    applyTheme(next);
  });
</script>
</body>
</html>
