<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechStore — Mi Perfil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" th:href="@{/css/general.css}"/>
</head>
<body>
<div id="wrapper">

  <div th:replace="~{fragments/sidebar :: sidebar('perfil')}"></div>

  <div id="content">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container-fluid px-4 py-4">

      <div class="mb-4">
        <h1 class="page-header-title">Mi Perfil</h1>
        <p class="page-header-subtitle">Información de tu cuenta</p>
      </div>

      <div class="row g-3">
        <div class="col-12 col-md-4">
          <div class="card border-0 text-center">
            <div class="card-body py-4">
              <img th:src="@{'https://ui-avatars.com/api/?name=' + ${usuarioActual} + '&background=0d6efd&color=fff&size=128'}"
                   class="rounded-circle mb-3"
                   width="80" height="80"
                   th:alt="${usuarioActual}"/>
              <h5 class="fw-bold mb-1" style="color:var(--text-primary);" th:text="${usuarioActual}">Usuario</h5>
              <span class="badge bg-primary bg-opacity-10">Sesión activa</span>
            </div>
          </div>
        </div>
        <div class="col-12 col-md-8">
          <div class="card border-0">
            <div class="card-body">
              <h6 class="fw-semibold mb-3" style="color:var(--text-primary);">
                <i class="fa-solid fa-user-gear me-2 text-primary"></i>Cambiar Contraseña
              </h6>
              <form class="row g-3">
                <div class="col-12">
                  <label class="form-label">Contraseña Actual</label>
                  <input type="password" class="form-control" placeholder="••••••••"/>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Nueva Contraseña</label>
                  <input type="password" class="form-control" placeholder="••••••••"/>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Confirmar Contraseña</label>
                  <input type="password" class="form-control" placeholder="••••••••"/>
                </div>
                <div class="col-12 d-flex justify-content-end">
                  <button type="submit" class="btn btn-primary btn-rounded px-4">
                    <i class="fa-solid fa-key me-2"></i>Actualizar Contraseña
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script th:src="@{/js/btn_sidebar.js}"></script>
</body>
</html>
